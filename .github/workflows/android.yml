name: Build Android APK

# Builds the INKVERSE Android app (.apk) in the cloud — no Android Studio needed.
# Run it from the GitHub "Actions" tab (Run workflow), then download the APK artifact.
on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The committed android/ project references @capacitor/android from
      # node_modules, which isn't committed — restore it, then wire it up.
      - name: Install Capacitor + sync
        working-directory: mobile
        run: |
          npm ci
          npx cap sync android

      # If you've set up Firebase, add its config so push notifications work.
      # Secret GOOGLE_SERVICES_JSON = base64 of google-services.json. Optional —
      # without it the app still builds (push just stays off).
      - name: Add Firebase config (optional)
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS" ]; then
            echo "$GS" | base64 -d > mobile/android/app/google-services.json
            echo "google-services.json added — push enabled"
          else
            echo "No GOOGLE_SERVICES_JSON secret — building without push"
          fi

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: inkverse-android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # Publish the APK into the website's public/ so users can download it at
      # /downloads/inkverse.apk (Vercel redeploys on this push).
      - name: Publish APK to the website
        run: |
          mkdir -p public/downloads
          cp mobile/android/app/build/outputs/apk/release/app-release.apk public/downloads/inkverse.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/downloads/inkverse.apk
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore(android): publish latest APK to /downloads [skip ci]"
          # main may have advanced while we built — rebase + retry so the push
          # doesn't get silently rejected (which left a stale APK published).
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          echo "::error::failed to publish APK after retries"; exit 1
