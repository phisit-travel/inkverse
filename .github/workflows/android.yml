name: Build Android APK

# Builds the INKVERSE Android app (.apk) in the cloud — no Android Studio needed.
# Run it from the GitHub "Actions" tab (Run workflow), then download the APK artifact.
on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The committed android/ project references @capacitor/android from
      # node_modules, which isn't committed — restore it, then wire it up.
      - name: Install Capacitor + sync
        working-directory: mobile
        run: |
          npm ci
          npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inkverse-android-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
